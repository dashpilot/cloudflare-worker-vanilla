<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>{{TITLE}}</title>
		<style>
			:root {
				color-scheme: light dark;
				--fg: #111;
				--muted: #666;
				--bg: #fafafa;
				--border: #ddd;
			}
			@media (prefers-color-scheme: dark) {
				:root {
					--fg: #eee;
					--muted: #999;
					--bg: #121212;
					--border: #333;
				}
			}
			* {
				box-sizing: border-box;
			}
			body {
				font-family: system-ui, sans-serif;
				margin: 0;
				min-height: 100vh;
				background: var(--bg);
				color: var(--fg);
				line-height: 1.5;
			}
			header {
				border-bottom: 1px solid var(--border);
				padding: 1rem 1.5rem;
				display: flex;
				flex-wrap: wrap;
				align-items: center;
				gap: 1rem;
			}
			header strong {
				font-size: 1.1rem;
			}
			nav {
				display: flex;
				gap: 0.75rem;
				flex-wrap: wrap;
			}
			nav a {
				color: inherit;
				text-decoration: none;
				padding: 0.25rem 0.5rem;
				border-radius: 6px;
			}
			nav a:hover {
				background: var(--border);
			}
			main {
				max-width: 40rem;
				padding: 2rem 1.5rem;
			}
			p {
				margin: 0 0 1rem;
			}
			.muted {
				color: var(--muted);
				font-size: 0.95rem;
			}
			code {
				font-size: 0.9em;
				padding: 0.15em 0.35em;
				border-radius: 4px;
				background: var(--border);
			}
		</style>
	</head>
	<body>
		<header>
			<strong>Vanilla Worker with Layout</strong>
			<nav>
				<a href="/">Home</a>
				<a href="/about">About</a>
				<a href="/contact">Contact</a>
				<a href="/api/hello">API (JSON)</a>
			</nav>
		</header>
		<main>
			<h1>{{TITLE}}</h1>
			{{BODY}}
		</main>
	</body>
</html>
